name: Security Scan (SBOM + CVE Audit)

# L-01: Software Composition Analysis + SBOM generation
# L-05: CVE detection on both Python and Node.js dependency trees
#
# Runs:
#   - Weekly on Monday mornings (to catch new CVEs)
#   - On every PR that touches dependency files
#   - Manually (workflow_dispatch)

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  pull_request:
    paths:
      - 'python/requirements*.txt'
      - 'python/pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  python-security-scan:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Export production requirements
        # Export only non-dev dependencies so we audit what ships to production.
        # uv export writes a pip-compatible requirements.txt with pinned hashes.
        run: |
          cd python
          uv export --no-dev --no-hashes -o requirements-audit.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (fail on HIGH/CRITICAL)
        # Audit only our exported requirements, not pip-audit's own deps.
        # --skip-editable avoids re-auditing the local package itself.
        run: |
          pip-audit \
            --requirement python/requirements-audit.txt \
            --skip-editable \
            --format json \
            --output python/sbom-python.json \
            --vulnerability-service pypi \
            || (echo "❌ Vulnerabilities found in Python deps!" && cat python/sbom-python.json && exit 1)

      - name: Generate CycloneDX SBOM (Python)
        continue-on-error: true   # SBOM is an informational artifact — not a security gate
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements python/requirements-audit.txt \
            --of JSON \
            > python/sbom-cyclonedx-python.json

      - name: Upload Python SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-sbom
          path: |
            python/sbom-python.json
            python/sbom-cyclonedx-python.json
          retention-days: 90

  node-security-scan:
    name: Node.js Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit (fail on HIGH/CRITICAL)
        run: |
          npm audit \
            --audit-level=high \
            --json \
            > sbom-npm.json \
            || (echo "❌ High/Critical vulnerabilities found!" && cat sbom-npm.json && exit 1)

      - name: Upload Node.js SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-sbom
          path: sbom-npm.json
          retention-days: 90

  notify-on-failure:
    name: Notify on Security Issues
    runs-on: ubuntu-latest
    needs: [python-security-scan, node-security-scan]
    if: failure()
    steps:
      - name: Log failure summary
        run: |
          echo "⚠️ Security scan failed — review SBOM artifacts for details."
          echo "Action required: update vulnerable dependencies before next deploy."
